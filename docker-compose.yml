services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-collector-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_collector
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: ai-collector-ml-service
    restart: unless-stopped
    env_file:
      - ./ml-service/.env.example
    ports:
      - "8001:8001"
    volumes:
      - ./ml-service/serialized_models:/app/serialized_models
      - ./ml-service/datasets:/app/datasets

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-collector-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_collector
      ML_SERVICE_URL: http://ml-service:8001
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-collector-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.example
    ports:
      - "3002:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
